<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        #app {width: 1000px; margin: 0 auto;}

        header, nav, footer {height: 50px; line-height: 50px;}

        header {
            color: white;
            background-color: rgb(154, 179, 215);
            text-align: center;
            font-size: 2em;
            letter-spacing: 1em;
            font-weight: bold;
        }

        nav>ul {background-color: rgb(146, 162, 255); overflow: hidden; list-style: none;}

        nav>ul>li {float: left; width: 150px;}

        nav>ul>li>a {color: white; display: block; text-align: center; text-decoration: none;}
        
        nav>ul>li>a:hover {font-weight: bold; background-color: rgb(83, 98, 188) ;}

        main {overflow: hidden;}

        aside {
            width: 100px;
            height: 600px;
            border: 1px solid black;
            text-align: center;
            float: left;
        }

        section {
            width: 800px;
            min-height: 800px;
            padding: 15px;
            float: left;
        }

        th
        thead>tr>th {padding: 15px;}

        footer {text-align: center;}

        .finish {text-decoration: line-through; font-style: italic;}
    </style>
</head>
<body>
    <div id="app">
        <header>TODOS</header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="http://www.youtube.com">유튜브</a></li>
                <li><a href="https://comic.naver.com/index">네이버웹툰</a></li>
                <li><a href="https://minesweeper.us/%EC%A7%80%EB%A2%B0%EC%B0%BE%EA%B8%B0/">지뢰찾기</a></li>
            </ul>
        </nav>
        <main>
            <aside>왼쪽</aside>
            <section>
                <div class="mt-3 mb-3">
                    <label class="form-label">작성자</label>
                    <input type="text" id="name" class="form-control">
                </div>

                <div class="mt-3 mb-3">
                    <label class="form-label">나의 할일</label>                            
                    <input type="text" id="title" class="form-control">
                </div>
                    
                    <div class="mt-3 mb-3">
                        <label class="form-label">마감일</label>
                        <input type="date" id="deadline" class="form-control">
                    </div>

                    <div class="d-grid mt-3 mb-3">
                        <button type="button" class="btn btn-outline-primary btn-block" onclick="작성()">작성</button>
                    </div>
                    <table class="table table-hover mt-3">
                        <thead>
                            <tr>
                                <th>작성자</th>
                                <th>할일</th>
                                <th>마감일</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
            </section>
            <aside>오른쪽</aside>
        </main>
        <footer>
            hasaway@naver.com
        </footer>
    </div>
    <script>
        let tno=1;
        const todos=[];
        const $name = document.getElementById('name');
        const $title = document.getElementById('title');
        const $deadline = document.getElementById('deadline')
        const $tbody = document.getElementById('tbody');

        function 작성() {
            name = $name.value; title = $title.value; deadline = $deadline.value;
            const todo={tno,title,name,deadline, finish:false};
            todos.push(todo);
            tno++
            출력()
        }

        function 출력() {
            let html = "";
            for(const todo of todos) {
                html+=`
                <tr class='${todo.finish?"finish":""}'>
                    <td>${todo.name}</td>
                    <td onclick='변경(${todo.tno})' class='${todo.finish?"finish":""}'>${todo.title}${todo.finish?"(완료)":""}</td>
                    <td>${todo.deadline}</td>
                    <td><button class="btn btn-danger" onclick="삭제(${todo.tno})">삭제</button></td>
                </tr>`
            }
            $tbody.innerHTML = html;
        }

        function 삭제(tno) {
            for(let i=0; i<todos.length; i++) {
                if(todos[i].tno===tno) {
                    todos.splice(i,1)
                    break;
                }
            }
            출력();
        }

        function 변경(tno) {
            for(todo of todos) {
                if(todo.tno===tno) {
                    todo.finish=!todo.finish;
                }
            }
            출력();
        }
    </script>
</body>
</html>
